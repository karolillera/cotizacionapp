services:
  backend:
    build: ./backend
    container_name: seltel-backend
    ports:
      - "4000:4000"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - evolution-net

  frontend:
    build: ./frontend
    container_name: seltel-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

networks:
  evolution-net:
    external: true